<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark rounded background matching dashboard theme -->
  <rect width="64" height="64" rx="12" fill="#0a0e14"/>
  <rect x="1" y="1" width="62" height="62" rx="11" fill="none" stroke="#1f2937" stroke-width="1"/>

  <!-- Faint baseline grid line -->
  <line x1="8" y1="44" x2="56" y2="44" stroke="#1f2937" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- Trend arrow line — momentum sloping up -->
  <path d="M 8 50 L 22 38 L 36 30 L 52 14"
        stroke="#00d4a4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow head at top right -->
  <path d="M 46 14 L 52 14 L 52 20"
        stroke="#00d4a4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Three rising candles in the foreground -->
  <!-- Candle 1 -->
  <line x1="16" y1="40" x2="16" y2="52" stroke="#00d4a4" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="13" y="42" width="6" height="8" rx="1" fill="#00d4a4"/>

  <!-- Candle 2 -->
  <line x1="30" y1="30" x2="30" y2="46" stroke="#00d4a4" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="27" y="32" width="6" height="12" rx="1" fill="#00d4a4"/>

  <!-- Candle 3 (tallest, momentum) -->
  <line x1="44" y1="18" x2="44" y2="40" stroke="#00d4a4" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="41" y="20" width="6" height="16" rx="1" fill="#00d4a4"/>
</svg>
